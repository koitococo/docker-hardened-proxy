listeners:
  tcp:
    address:
      - "127.0.0.1:2375"
      # - "0.0.0.0:2375"  # 可以添加更多监听地址
  unix:
    path: "/var/run/docker-proxy.sock"
    mode: 0660

upstream:
  # unix:///path/to/docker.sock or tcp://host:port
  url: "unix:///var/run/docker.sock"
  # Optional TLS config for tcp:// upstream (when daemon uses HTTPS)
  # tls:
  #   ca: "/path/to/ca.pem"
  #   cert: "/path/to/cert.pem"
  #   key: "/path/to/key.pem"

namespace: "default"

audit:
  # Block creation of privileged containers
  deny_privileged: true
  # Block containers using host network mode
  deny_host_network: true
  # Block containers using host PID namespace
  deny_host_pid: true
  # Block containers using host IPC namespace
  deny_host_ipc: true
  # Block specific mount types (e.g., ["proc", "sysfs"])
  deny_privileged_mounts: []
  # Block BuildKit/buildx operations entirely
  deny_buildkit: true
  # Fine-grained BuildKit policy (only applies when deny_buildkit is false)
  buildkit:
    # Allow disk usage queries
    allow_disk_usage: false
    # Allow prune operations (cleanup)
    allow_prune: false
    # Allow build history operations
    allow_history: false
    # Session service policies
    session:
      # Allow file sync operations (safe file transfers)
      allow_filesync: true
      # Allow upload operations (safe file transfers)
      allow_upload: true
      # Allow secret forwarding (disabled by default for security)
      allow_secrets: false
      # Allow SSH agent forwarding (disabled by default for security)
      allow_ssh: false
      # Allow authentication token operations (disabled by default for security)
      allow_auth: false

  # Fine-grained BuildKit policy. These defaults apply when deny_buildkit is false.
  buildkit:
    # Allow read-only worker info by default, but keep higher-risk control methods denied.
    allow_disk_usage: false
    allow_prune: false
    allow_history: false
    session:
      # Buildx file transfer paths are allowed by default.
      allow_filesync: true
      allow_upload: true
      # High-risk session services stay denied unless explicitly enabled.
      allow_secrets: false
      allow_ssh: false
      allow_auth: false

logging:
  level: "info"
  format: "json"
