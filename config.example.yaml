listeners:
  tcp:
    address:
      - "127.0.0.1:2375"
      # - "0.0.0.0:2375"  # 可以添加更多监听地址
  unix:
    path: "/var/run/docker-proxy.sock"
    mode: 0660

upstream:
  # unix:///path/to/docker.sock or tcp://host:port
  url: "unix:///var/run/docker.sock"
  # Optional TLS config for tcp:// upstream (when daemon uses HTTPS)
  # tls:
  #   ca: "/path/to/ca.pem"
  #   cert: "/path/to/cert.pem"
  #   key: "/path/to/key.pem"

namespace: "default"

audit:
  deny_privileged: true
  deny_security_opt_override: true
  deny_devices: true
  deny_info: true
  deny_oom_kill_disable: true
  deny_pids_limit_override: true
  deny_log_config_override: true
  denied_capabilities:
    - "ALL"
    - "SYS_ADMIN"
    - "NET_ADMIN"
  sysctls:
    # "deny" (default): only allow sysctls in the allowed list
    # "allow": allow all sysctls
    default_action: "deny"
    # allowed:
    #   - "net.ipv4.ping_group_range"
  bind_mounts:
    default_action: "deny"
    rules:
      - source_prefix: "/home/ubuntu"
        rewrite_prefix: "/path/to/container/home/ubuntu"
        action: "allow"
  namespaces:
    network_mode:
      deny_host: true
    ipc_mode:
      deny_host: true
    pid_mode:
      deny_host: true
    uts_mode:
      deny_host: true
  build:
    # "deny" (default): block all builds
    # "allow": allow all builds (with security enforcement)
    # "list": allow builds only for listed image names
    policy: "deny"
    # For "list" policy: allowed image name patterns.
    # Entries ending with "/" act as prefix matches (e.g., "registry.example.com/").
    # Other entries match the exact image name (with or without tag).
    # allowed:
    #   - "myapp"
    #   - "registry.example.com/"
    #
    # Security enforcement (always active when builds are allowed):
    #   - Dangerous entitlements (network.host, security.insecure) are stripped
    #   - networkmode=host is denied
    #   - BuildKit remains denied by default; if enabled, /session and /grpc use separate audit policy
  pull:
    # "allow" (default): allow all image pulls
    # "deny": block all image pulls
    # "list": allow pulls only for listed images/registries
    policy: "allow"
    # For "list" policy: allowed image name patterns (same syntax as build.allowed).
    # allowed:
    #   - "alpine"
    #   - "docker.io/library/"
  registry:
    # "deny" (default): block all registry authentication and image push
    # "allow": allow all registry operations
    # "list": allow only for listed registries/images
    auth: "deny"
    # For "list" policy: allowed registry URL prefixes for authentication
    # auth_allowed:
    #   - "https://registry.example.com"
    #   - "registry.example.com"
    push: "deny"
    # For "list" policy: allowed image name prefixes for push
    # push_allowed:
    #   - "registry.example.com/myapp/"
    #   - "myregistry.com/"

  # Top-level BuildKit kill switch.
  # Default: true (deny all BuildKit control and session traffic)
  deny_buildkit: true

  # Fine-grained BuildKit policy. These defaults apply when deny_buildkit is false.
  buildkit:
    # Allow read-only worker info by default, but keep higher-risk control methods denied.
    allow_disk_usage: false
    allow_prune: false
    allow_history: false
    session:
      # Buildx file transfer paths are allowed by default.
      allow_filesync: true
      allow_upload: true
      # High-risk session services stay denied unless explicitly enabled.
      allow_secrets: false
      allow_ssh: false
      allow_auth: false

logging:
  level: "info"
  format: "json"
